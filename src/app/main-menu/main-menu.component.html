<header>
	<a class="logo" href="#">🚀</a>

	<input id="nav" type="checkbox">
	<label for="nav"></label>

	<nav>
		<ul>
			<!-- Navigation -->
			<li>
				<a [ngClass]="state" routerLink="">Home</a>
			</li>
			<li>
				<a [ngClass]="state" routerLink="contact">Contact</a>
			</li>
			<li>
				<a [ngClass]="state" routerLink="tinkering">Tinkering</a>
			</li>
			<!-- Settings -->
			<li>
				<a (click)="selectGlitchState(state === glitchStates.boring ? glitchStates.glitchy : glitchStates.boring)">
					Change style
				</a>
			</li>
			<li>
				<a (click)="changeLanguage($event)">Change language</a>
			</li>
		</ul>
	</nav>
</header>
