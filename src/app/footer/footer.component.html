<footer>
	<div class="language">
		<h3>⛿ Language </h3>
		<ul>
			<li *ngFor="let language of availableLanguages">
				<a (click)="changeLanguage(language)">
					{{language}}
				</a>
			</li>
		</ul>
	</div>
	<!-- <div>
		some long ass text for your viewing pleasure lol
	</div> -->
	<div class="made-with">
		<span translate="FOOTER.MADE_WITH"></span>
		<a href="https://angular.io/" target="_blank">
			<bg-glitchy-picture [state]="state" jitterSpeed="350" pictureUrl="../assets/angular.svg" pictureHeight="120" pictureWidth="120">
			</bg-glitchy-picture>
			<span translate="FOOTER.ANGULAR"></span>
		</a>
	</div>
</footer>
