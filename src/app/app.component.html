<div [ngClass]="currentGlitchState">
    <bg-glitchy-text text="Soon." [state]="currentGlitchState"></bg-glitchy-text>
    <bg-rad-loader [color]="currentGlitchState === glitchStates.Glitchy ? '#fff' : '#000'" [size]="'10em'" [state]="currentGlitchState"></bg-rad-loader>

    <button (click)="toggleGlitchState($event)" [ngClass]="currentGlitchState">
        {{ currentGlitchState === glitchStates.Glitchy ? "Glitchy!" : "Boring..." }}
    </button>
</div>
